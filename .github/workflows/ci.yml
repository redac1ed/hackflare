name: CI

on:
  push:
    paths-ignore:
      - "**/*.md"
      - .github/workflows/docker-frontend.yml
      - .github/workflows/docker-backend.yml
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - .github/workflows/docker-frontend.yml
      - .github/workflows/docker-backend.yml
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Run SQLx checks locally instead of against a real DB during CI
  SQLX_OFFLINE: true

jobs:
  rust:
    name: Rust Checks
    runs-on: blacksmith-8vcpu-ubuntu-2404
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: hackflare
          POSTGRES_USER: hackflare
          POSTGRES_DB: hackflare
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Cargo check
        run: cargo check --all-targets

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres,rustls

      - name: Run migrations
        run: cargo sqlx migrate run
        env:
          DATABASE_URL: postgres://hackflare:hackflare@localhost:5432/hackflare
          SQLX_OFFLINE: false

      - name: Check offline query files
        run: cargo sqlx prepare --check --workspace
        env:
          DATABASE_URL: postgres://hackflare:hackflare@localhost:5432/hackflare
          SQLX_OFFLINE: false

  frontend:
    name: Frontend Checks
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Format check
        run: npx prettier --check "**/*.{ts,tsx}"
