services:
  api:
    profiles: [backend]
    build:
      context: .
      dockerfile: hackflare_api/Dockerfile
    platform: linux/amd64
    env_file:
      - .env
    environment:
      - RUST_LOG=debug,hackflare=trace
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "53:5353/udp"
      - "53:5353/tcp"
    depends_on:
      db:
        condition: service_healthy

  db:
    profiles: [backend]
    image: postgres:18
    restart: unless-stopped
    shm_size: 256mb
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/18
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackflare"]
      interval: 3s
      retries: 10
      start_period: 10s

  frontend:
    profiles: [frontend]
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
    platform: linux/amd64
    env_file:
      - .env
    ports:
      - "3000:3000"

  pgadmin4:
    profiles: [backend]
    image: dpage/pgadmin4
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
