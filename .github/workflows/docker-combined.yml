name: Combined Docker Image

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, closed]
    paths:
      - 'frontend/**'
      - 'hackflare_api/**'
      - 'hackflare_dns/**'
      - 'migrations/**'
      - 'Cargo.toml'
      - 'Dockerfile.combined'
      - 'hackflare_supervisord.conf'
      - '.github/workflows/docker-combined.yml'
      - '.dockerignore'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hack-flare/hackflare-combined

jobs:
  build-check:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    concurrency:
      group: combined-check-${{ github.ref }}-${{ matrix.platform }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: blacksmith-4vcpu-ubuntu-2404
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build Docker image (smoke test)
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile.combined
          network: host
          platforms: ${{ matrix.platform }}
          push: false

  publish:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
    concurrency:
      group: combined-publish-${{ github.ref }}-${{ matrix.platform }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: blacksmith-8vcpu-ubuntu-2404
            tag-suffix: -amd64
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=${{ matrix.tag-suffix }}
            type=sha,suffix=${{ matrix.tag-suffix }}
            type=raw,value=latest${{ matrix.tag-suffix }}

      - name: Build and push Docker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile.combined
          network: host
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  merge-manifest:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
    needs: publish
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    steps:
      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        shell: bash
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            TAG_PART="${TAG##*:}"
            docker buildx imagetools create \
              -t "$TAG" \
              "$IMAGE:${TAG_PART}-amd64"
          done <<< "$TAGS"
